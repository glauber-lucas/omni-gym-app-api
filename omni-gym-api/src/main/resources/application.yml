server:
  port: 8080
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/omni_gym
    driverClassName: org.postgresql.Driver
    username: postgres
    password: 123
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: change-me-to-a-strong-secret-in-prod
  expiration-ms: 3600000 # 1 hour

app:
  upload:
    dir: uploads
    max-file-size: 52428800  # 50MB em bytes
  security:
    instructor-token: secret-instructor-key

management:
  endpoints:
    web:
      exposure:
        include: health,info

